# PlanFlow OTA 更新服务器配置
# 将此文件放到服务器 /etc/nginx/sites-available/planflow.conf

server {
    listen 80;
    server_name _;  # 或填写你的域名

    root /var/www/planflow/dist;
    index index.html;

    # OTA 更新关键文件 - 禁止缓存
    location ~* \.(json|zip)$ {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
    }

    # 静态资源 - 长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # 其他文件
    location / {
        try_files $uri $uri/ =404;
        add_header Access-Control-Allow-Origin "*";
    }
}